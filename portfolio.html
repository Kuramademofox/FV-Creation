<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portfolio | FV Creations</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
    <script src="https://unpkg.com/@studio-freight/lenis@1.0.39/dist/lenis.min.js"></script>
  </head>
  <body>
    <div class="ambient-bg">
      <div class="orb orb-1"></div>
      <div class="orb orb-2"></div>
      <div class="orb orb-3"></div>
    </div>

    <nav class="glass-nav">
      <a
        href="index.html"
        class="logo hover-expand"
        style="text-decoration: none; color: inherit"
        >FV<span>.</span></a
      >
      <div class="nav-links">
        <a href="index.html" class="magnetic nav-link">Overview</a>
        <a
          href="portfolio.html"
          class="magnetic nav-link"
          style="color: var(--accent)"
          >Portfolio</a
        >
        <a href="vision.html" class="magnetic nav-link">Vision</a>
        <a href="inquiries.html" class="magnetic nav-link">Inquiries</a>
      </div>
    </nav>

    <section class="portfolio" style="padding-top: 200px">
      <div class="section-header reveal">
        <h2>The Archives</h2>
        <p>Complete visual catalog.</p>
      </div>

      <div class="gallery-track">
        <div class="grid-item reveal hover-expand">
          <img
            src="https://images.unsplash.com/photo-1542038784456-1ea8e935640e?q=80&w=800&auto=format&fit=crop"
            alt="Photography"
          />
          <div class="item-overlay"><span>01. Details</span></div>
        </div>
        <div class="grid-item reveal hover-expand">
          <img
            src="https://images.unsplash.com/photo-1510166089176-b57564a5b28e?q=80&w=800&auto=format&fit=crop"
            alt="Photography"
          />
          <div class="item-overlay"><span>02. Form</span></div>
        </div>
        <div class="grid-item reveal hover-expand">
          <img
            src="https://images.unsplash.com/photo-1506015391300-41521484075e?q=80&w=800&auto=format&fit=crop"
            alt="Photography"
          />
          <div class="item-overlay"><span>03. Space</span></div>
        </div>
        <div class="grid-item reveal hover-expand">
          <img
            src="https://images.unsplash.com/photo-1492691527719-9d1e07e534b4?q=80&w=800&auto=format&fit=crop"
            alt="Photography"
          />
          <div class="item-overlay"><span>04. Light</span></div>
        </div>
        <div class="grid-item reveal hover-expand">
          <img
            src="https://images.unsplash.com/photo-1515879218367-8466d910aaa4?q=80&w=800&auto=format&fit=crop"
            alt="Photography"
          />
          <div class="item-overlay"><span>05. Tech</span></div>
        </div>
        <div class="grid-item reveal hover-expand">
          <img
            src="https://images.unsplash.com/photo-1600607686527-6fb886090705?q=80&w=800&auto=format&fit=crop"
            alt="Photography"
          />
          <div class="item-overlay"><span>06. Aesthetic</span></div>
        </div>
      </div>

      <div class="redirect-container reveal" style="margin-top: 80px">
        <a href="inquiries.html" class="redirect-btn magnetic hover-expand"
          >Book a Session</a
        >
      </div>
    </section>

    <div class="custom-cursor"></div>
    <script src="script.js"></script>
  </body>
</html>
